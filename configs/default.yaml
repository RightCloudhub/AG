# AgenticGraphRAG default config (no secrets — use env vars)

app:
  name: agentic-graphrag
  env: local

guardrails:
  max_hops: 4          # P95: cap agentic depth (was 5)
  max_llm_calls: 16    # P95: tighter budget vs 20
  max_tokens_per_query: 50000
  query_timeout_seconds: 45  # fail faster than 60s wall (AC-4 target 8s still needs live)
  # Worst case: planner + (max_hops+1)*(executor+critic) + answer; LangGraph needs
  # limit > step count → 2*max_hops+5. Keep a little slack over the floor.
  recursion_limit: 15

retrieval:
  top_k: 10
  vector_top_k: 10
  fulltext_top_k: 10
  fusion_method: rrf   # rrf | concat (P3-PERF-03)
  fusion_k: 60
  parallel: true       # P3-PERF-02
  cache_answer_ttl_seconds: 3600
  graph:
    max_hop_neighbors: 2
    max_path_hops: 4
    max_neighbors_per_layer: 50
    max_paths: 20
    beam_width: 20
    high_degree_threshold: 30
    relation_relevance_threshold: 0.12

triage:
  enabled: true        # P3-PERF-01 — keep on for Fast Path P95 ≤3s simple facts
  escalate_fast_path: true

knowledge:
  chunk_size_chars: 1200
  chunk_overlap_chars: 150
  extract_confidence_threshold: 0.5
  schema_path: configs/schema/domain_v0.yaml
  extract_max_attempts: 3
  extract_retry_base_delay_seconds: 0.5
  extract_journal_path: data/processed/extract_journal.jsonl
  extract_quarantine_path: data/processed/extract_quarantine.jsonl

llm:
  strong_model: gpt-4.1
  light_model: gpt-4.1-mini
  embedding_model: text-embedding-3-small
  # Optional; env LLM_EMBEDDING_BASE_URL / LLM_EMBEDDING_API_KEY preferred.
  # Leave empty to reuse chat LLM_BASE_URL / LLM_API_KEY.
  embedding_base_url: ""
  embedding_api_key: ""
  temperature: 0.0
  max_retries: 2
  timeout_seconds: 60

paths:
  data_dir: data
  raw_docs_dir: data/raw
  processed_dir: data/processed
  cache_dir: data/cache
  indexes_dir: data/indexes
  prompts_dir: configs/prompts

eval:
  cases_path: evals/datasets/g2_dev.jsonl
  report_dir: reports
